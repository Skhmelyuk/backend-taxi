{% extends "admin/base.html" %} {% load static %} {% block title %}{{ title }} |

<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: light !important;
    }
  }

  :root {
    color-scheme: light !important;

    /* Our theme */
    --p: #7900ff;
    --p-dark: #5a00cc;
    --p-soft: #ede9fe;
    --p-xsoft: #f5f3ff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --white: #ffffff;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.07);

    /* Override Django dark mode variables */
    --primary: #7900ff !important;
    --secondary: #ede9fe !important;
    --accent: #7900ff !important;
    --body-fg: #1f2937 !important;
    --body-bg: #f8f7fc !important;
    --body-quiet-color: #6b7280 !important;
    --body-loud-color: #1f2937 !important;
    --header-color: #ffffff !important;
    --header-branding-color: #ffffff !important;
    --header-bg: #7900ff !important;
    --header-link-color: #ffffff !important;
    --breadcrumbs-fg: #6b7280 !important;
    --breadcrumbs-link-fg: #7900ff !important;
    --breadcrumbs-bg: #f5f3ff !important;
    --link-fg: #7900ff !important;
    --link-hover-color: #5a00cc !important;
    --link-selected-fg: #5a00cc !important;
    --hairline-color: #e5e7eb !important;
    --border-color: #e5e7eb !important;
    --sidebar-spacer: #ede9fe !important;
    --module-bg: #ffffff !important;
    --content-bg: #ffffff !important;
    --darkened-bg: #f5f3ff !important;
    --selected-bg: #f5f3ff !important;
    --selected-row: #f5f3ff !important;
    --button-fg: #ffffff !important;
    --button-bg: #7900ff !important;
    --button-hover-bg: #5a00cc !important;
    --default-button-bg: #7900ff !important;
    --default-button-hover-bg: #5a00cc !important;
    --close-button-bg: #ef4444 !important;
    --close-button-hover-bg: #dc2626 !important;
    --delete-button-bg: #ef4444 !important;
    --delete-button-hover-bg: #dc2626 !important;
    --object-tools-fg: #ffffff !important;
    --object-tools-bg: #7900ff !important;
    --object-tools-hover-bg: #5a00cc !important;
    --input-bg: #ffffff !important;
    --input-border-color: #e5e7eb !important;
    --input-focus-border-color: #7900ff !important;
    --font-family-primary: "Inter", system-ui, sans-serif !important;
  }

  * {
    font-family: "Inter", system-ui, sans-serif !important;
    box-sizing: border-box;
  }

  /* ── Page background ── */
  html,
  body,
  #container {
    background: #f8f7fc !important;
    color: var(--text) !important;
  }

  /* ── Header — purple with logo ── */
  #header {
    background: var(--p) !important;
    border-bottom: none !important;
    box-shadow: 0 2px 12px rgba(121, 0, 255, 0.22) !important;
    padding: 0 24px !important;
    min-height: 56px !important;
    display: flex !important;
    align-items: center !important;
  }
  #branding h1,
  #branding h1 a {
    color: rgba(255, 255, 255, 0) !important;
    font-size: 0 !important;
    text-decoration: none !important;
  }
  #branding {
    display: flex !important;
    align-items: center !important;
  }
  #user-tools {
    color: rgba(255, 255, 255, 0.75) !important;
    font-size: 12px !important;
  }
  #user-tools a {
    color: rgba(255, 255, 255, 0.9) !important;
    font-weight: 500 !important;
    text-decoration: none !important;
  }
  #user-tools a:hover {
    color: #fff !important;
  }

  /* ── Breadcrumbs ── */
  div.breadcrumbs {
    background: var(--p-dark) !important;
    color: rgba(255, 255, 255, 0.65) !important;
    border-bottom: none !important;
    padding: 7px 24px !important;
    font-size: 12px !important;
  }
  div.breadcrumbs a {
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none !important;
    font-weight: 500 !important;
  }
  div.breadcrumbs a:hover {
    color: #fff !important;
  }

  /* ── Sidebar shell ── */
  #nav-sidebar {
    background: #f8f7fc !important;
    border-right: 1px solid var(--border) !important;
    padding: 8px 0 16px !important;
  }

  /* Search box */
  #nav-sidebar input[type="search"] {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 7px 10px !important;
    font-size: 12px !important;
    margin: 4px 10px 10px !important;
    width: calc(100% - 20px) !important;
    color: var(--text) !important;
    box-shadow: var(--shadow) !important;
  }
  #nav-sidebar input[type="search"]:focus {
    outline: none !important;
    border-color: var(--p) !important;
    box-shadow: 0 0 0 3px rgba(121, 0, 255, 0.1) !important;
  }

  /* Each app group — white card */
  #nav-sidebar .module {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    margin: 0 8px 8px !important;
    overflow: hidden !important;
    box-shadow: var(--shadow) !important;
  }

  /* App group header caption */
  #nav-sidebar .module caption,
  #nav-sidebar th {
    display: block !important;
    background: transparent !important;
    color: var(--p-dark) !important;
    font-size: 10px !important;
    font-weight: 800 !important;
    letter-spacing: 1px !important;
    text-transform: uppercase !important;
    padding: 10px 12px 6px !important;
    border-bottom: 1px solid var(--border) !important;
  }

  /* Table rows */
  #nav-sidebar table {
    width: 100% !important;
    border-collapse: collapse !important;
  }
  #nav-sidebar tr {
    display: flex !important;
    align-items: center !important;
    border-bottom: 1px solid #f3f4f6 !important;
  }
  #nav-sidebar tr:last-child {
    border-bottom: none !important;
  }
  #nav-sidebar td {
    vertical-align: middle !important;
    padding: 0 !important;
  }
  #nav-sidebar td:first-child {
    flex: 1 !important;
    min-width: 0 !important;
  }
  #nav-sidebar td:last-child {
    flex-shrink: 0 !important;
    padding-right: 8px !important;
  }

  /* Model links */
  #nav-sidebar td:first-child a {
    display: block !important;
    color: var(--text) !important;
    font-size: 12.5px !important;
    font-weight: 500 !important;
    padding: 8px 8px 8px 14px !important;
    text-decoration: none !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    border-radius: 0 !important;
    margin: 0 !important;
    transition:
      background 0.12s,
      color 0.12s !important;
  }
  #nav-sidebar td:first-child a:hover {
    background: var(--p-soft) !important;
    color: var(--p) !important;
  }
  #nav-sidebar tr.selected td:first-child a {
    background: var(--p-soft) !important;
    color: var(--p) !important;
    font-weight: 600 !important;
  }

  /* + Додати button */
  #nav-sidebar .addlink {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 2px !important;
    background: var(--p-soft) !important;
    color: var(--p) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    padding: 4px 9px !important;
    border-radius: 6px !important;
    text-decoration: none !important;
    white-space: nowrap !important;
    line-height: 1.4 !important;
    transition:
      background 0.12s,
      color 0.12s !important;
  }
  #nav-sidebar .addlink:hover {
    background: var(--p) !important;
    color: var(--white) !important;
  }

  /* ── Module boxes ── */
  .module,
  fieldset.module {
    background: var(--white) !important;
    border: 1px solid #e8e3f8 !important;
    border-top: 3px solid #7900ff !important;
    border-radius: 14px !important;
    box-shadow:
      0 2px 12px rgba(121, 0, 255, 0.07),
      0 1px 3px rgba(0, 0, 0, 0.04) !important;
    margin-bottom: 16px !important;
  }
  .module h2,
  .module caption,
  fieldset.module h2 {
    background: linear-gradient(135deg, #f5f3ff 0%, #faf9ff 100%) !important;
    color: #5a00cc !important;
    font-size: 12px !important;
    font-weight: 700 !important;
    letter-spacing: 0.4px !important;
    padding: 10px 16px !important;
    margin: 0 !important;
    border-bottom: 1px solid #ede9fe !important;
    text-transform: uppercase !important;
    border-radius: 11px 11px 0 0 !important;
  }

  /* ── Table ── */
  #result_list {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    overflow: hidden !important;
    width: 100% !important;
    box-shadow: var(--shadow) !important;
  }
  #result_list thead th {
    background: var(--p-xsoft) !important;
    color: var(--muted) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    letter-spacing: 0.4px !important;
    text-transform: uppercase !important;
    padding: 9px 12px !important;
    border-bottom: 1px solid var(--p-soft) !important;
    white-space: nowrap !important;
  }
  #result_list thead th a {
    color: var(--muted) !important;
  }
  #result_list thead th a:hover,
  #result_list thead th.sorted a {
    color: var(--p) !important;
  }
  #result_list tbody tr {
    border-bottom: 1px solid #f3f4f6 !important;
    transition: background 0.1s !important;
  }
  #result_list tbody tr:hover {
    background: var(--p-xsoft) !important;
  }
  #result_list tbody tr:last-child {
    border-bottom: none !important;
  }
  #result_list td {
    padding: 9px 12px !important;
    font-size: 13px !important;
    vertical-align: middle !important;
    color: var(--text) !important;
  }
  #result_list td a:not([style*="background"]) {
    color: var(--p) !important;
    font-weight: 500 !important;
    text-decoration: none !important;
  }
  #result_list td a:not([style*="background"]):hover {
    color: var(--p-dark) !important;
  }
  #result_list td a[style*="background"] {
    text-decoration: none !important;
  }
  #result_list td input[type="checkbox"] {
    accent-color: var(--p) !important;
  }

  /* ── Filter sidebar ── */
  #changelist-filter {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    box-shadow: var(--shadow) !important;
    overflow: hidden !important;
  }
  #changelist-filter h2 {
    background: var(--p-xsoft) !important;
    color: var(--p-dark) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    letter-spacing: 0.6px !important;
    text-transform: uppercase !important;
    padding: 9px 14px !important;
    margin: 0 !important;
    border-bottom: 1px solid var(--p-soft) !important;
  }
  #changelist-filter h3 {
    color: var(--muted) !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    padding: 10px 14px 4px !important;
    margin: 0 !important;
    border-top: 1px solid #f3f4f6 !important;
  }
  #changelist-filter ul {
    padding: 0 0 6px !important;
    margin: 0 !important;
    list-style: none !important;
  }
  #changelist-filter ul li a {
    padding: 5px 14px !important;
    display: block !important;
    color: var(--text) !important;
    font-size: 13px !important;
    text-decoration: none !important;
  }
  #changelist-filter ul li a:hover {
    background: var(--p-soft) !important;
    color: var(--p) !important;
  }
  #changelist-filter ul li.selected a {
    color: var(--p) !important;
    font-weight: 600 !important;
  }

  /* ── Buttons ── */
  .button,
  input[type="submit"],
  input[type="button"],
  .submit-row input,
  a.button {
    background: var(--p) !important;
    color: #fff !important;
    border: none !important;
    border-radius: 8px !important;
    padding: 7px 16px !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    transition: background 0.15s !important;
    text-decoration: none !important;
    box-shadow: 0 1px 3px rgba(121, 0, 255, 0.18) !important;
  }
  .button:hover,
  input[type="submit"]:hover {
    background: var(--p-dark) !important;
  }

  .deletelink,
  .deletelink:link,
  a.deletelink {
    background: #fef2f2 !important;
    color: #dc2626 !important;
    border: 1px solid #fecaca !important;
    border-radius: 8px !important;
    padding: 7px 16px !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    text-decoration: none !important;
    box-shadow: none !important;
  }
  .deletelink:hover {
    background: #fee2e2 !important;
  }

  /* ── Submit row ── */
  .submit-row {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    padding: 10px 14px !important;
    gap: 8px !important;
    box-shadow: var(--shadow) !important;
  }
  .submit-row a.deletelink,
  .submit-row p.deletelink-box a {
    background: #ef4444 !important;
    color: #ffffff !important;
    border: none !important;
    border-radius: 8px !important;
    padding: 11px 20px !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    text-decoration: none !important;
    box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25) !important;
    transition:
      background 0.15s,
      box-shadow 0.15s !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
  }
  .submit-row a.deletelink::before {
    content: "🗑" !important;
    font-size: 14px !important;
  }
  .submit-row a.deletelink:hover,
  .submit-row p.deletelink-box a:hover {
    background: #dc2626 !important;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35) !important;
    color: #ffffff !important;
  }

  /* ── Form inputs ── */
  input[type="text"]:not(#searchbar),
  input[type="email"],
  input[type="password"],
  input[type="url"],
  input[type="number"],
  select,
  textarea {
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 7px 10px !important;
    font-size: 13px !important;
    background: var(--white) !important;
    color: var(--text) !important;
    transition:
      border-color 0.15s,
      box-shadow 0.15s !important;
  }
  #searchbar {
    border: none !important;
    border-radius: 0 !important;
    padding: 9px 4px !important;
    background: transparent !important;
    box-shadow: none !important;
    outline: none !important;
  }
  input:not(#searchbar):focus,
  select:focus,
  textarea:focus {
    outline: none !important;
    border-color: var(--p) !important;
    box-shadow: 0 0 0 3px rgba(121, 0, 255, 0.09) !important;
  }

  /* ── Inline groups ── */
  .inline-group {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    overflow: hidden !important;
    margin-bottom: 14px !important;
    box-shadow: var(--shadow) !important;
  }
  .inline-group h2 {
    background: var(--p-xsoft) !important;
    color: var(--p-dark) !important;
    font-size: 12px !important;
    font-weight: 700 !important;
    padding: 9px 14px !important;
    margin: 0 !important;
    border-bottom: 1px solid var(--p-soft) !important;
  }

  /* ── Inline action buttons in list (e.g. driver profile link) ── */
  #result_list td a[style*="background:#7900FF"],
  #result_list td a[style*="background: #7900FF"] {
    color: #ffffff !important;
  }

  /* ── Object tools ── */
  ul.object-tools li a {
    background: var(--p) !important;
    border-radius: 8px !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    padding: 6px 12px !important;
    box-shadow: 0 1px 3px rgba(121, 0, 255, 0.18) !important;
  }
  ul.object-tools li a:hover {
    background: var(--p-dark) !important;
  }

  /* ── Pagination ── */
  .paginator a,
  .paginator .this-page {
    border-radius: 6px !important;
    padding: 3px 9px !important;
    font-size: 13px !important;
  }
  .paginator a {
    color: var(--p) !important;
  }
  .paginator a:hover {
    background: var(--p-soft) !important;
  }
  .paginator .this-page {
    background: var(--p) !important;
    color: #fff !important;
    font-weight: 700 !important;
  }

  /* ── Messages ── */
  ul.messagelist li {
    border-radius: 8px !important;
    padding: 9px 14px !important;
    margin-bottom: 8px !important;
    font-size: 13px !important;
    font-weight: 500 !important;
  }
  ul.messagelist li.success {
    background: #f0fdf4 !important;
    color: #166534 !important;
    border: 1px solid #bbf7d0 !important;
  }
  ul.messagelist li.warning {
    background: #fffbeb !important;
    color: #92400e !important;
    border: 1px solid #fde68a !important;
  }
  ul.messagelist li.error {
    background: #fef2f2 !important;
    color: #991b1b !important;
    border: 1px solid #fecaca !important;
  }

  /* ── Actions bar ── */
  .actions {
    background: var(--p-xsoft) !important;
    border: 1px solid var(--p-soft) !important;
    border-radius: 8px !important;
    padding: 8px 16px 8px 20px !important;
    margin-bottom: 10px !important;
  }
  #changelist .actions button,
  .actions button.button {
    padding: 7px 22px !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    border-radius: 8px !important;
    min-height: 34px !important;
  }
  #changelist .actions select,
  .actions select {
    border-radius: 8px !important;
    font-size: 13px !important;
    height: auto !important;
    min-height: 32px !important;
    width: auto !important;
    min-width: 260px !important;
    max-width: none !important;
    padding: 5px 8px !important;
  }

  /* ── Search ── */
  #toolbar {
    padding: 12px 0 !important;
    box-sizing: border-box !important;
  }
  #changelist-search {
    box-sizing: border-box !important;
  }
  #changelist-search > div {
    width: 50% !important;
    box-sizing: border-box !important;
    margin-left: 16px !important;
  }

  /* ── Row striping softer ── */
  #result_list tbody tr:nth-child(even) {
    background: #fdfcff !important;
  }
  #result_list tbody tr:nth-child(even):hover {
    background: var(--p-xsoft) !important;
  }

  /* ── Inline tables — fix text clipping ── */
  .inline-group .tabular table {
    table-layout: auto !important;
    width: 100% !important;
  }
  .inline-group .tabular td,
  .inline-group .tabular th {
    padding: 8px 10px !important;
    vertical-align: middle !important;
    font-size: 12px !important;
    white-space: nowrap !important;
  }
  /* Status badge — nowrap, compact */
  .inline-group .tabular td.field-status_badge {
    width: 110px !important;
  }
  /* Preview / photo — fixed narrow */
  .inline-group .tabular td.field-doc_preview {
    width: 96px !important;
  }
  /* Address columns — allow wrap */
  .inline-group .tabular td.field-pickup_address,
  .inline-group .tabular td.field-dropoff_address {
    white-space: normal !important;
    word-break: break-word !important;
    min-width: 120px !important;
    max-width: 200px !important;
  }
  /* Passenger email — allow wrap */
  .inline-group .tabular td.field-passenger_email {
    white-space: normal !important;
    word-break: break-word !important;
    min-width: 120px !important;
    max-width: 180px !important;
  }
  /* Reviewer field — icons on new line below select */
  .inline-group .tabular td.field-reviewer .related-widget-wrapper {
    display: flex !important;
    flex-wrap: wrap !important;
    align-items: center !important;
    gap: 4px 6px !important;
  }
  .inline-group .tabular td.field-reviewer .related-widget-wrapper select {
    flex: 0 0 100% !important;
    width: 100% !important;
  }
  .inline-group .tabular td.field-reviewer .related-widget-wrapper-link {
    display: inline-flex !important;
    align-items: center !important;
  }

  /* Notes textarea */
  .inline-group .tabular td.field-notes {
    white-space: normal !important;
  }
  .inline-group .tabular td.field-notes textarea {
    width: 160px !important;
  }

  /* Hide __str__ original column in ALL tabular inlines */
  .inline-group .tabular table thead tr th.original,
  .inline-group .tabular table tbody tr td.original {
    display: none !important;
    width: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
  }

  /* ── Logo in branding ── */
  #branding-logo {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    height: 56px;
    padding: 10px 0;
  }
  #branding-logo img.logo-main {
    height: 36px;
    width: auto;
    filter: brightness(0) invert(1);
  }
  #branding-logo img.logo-sub {
    height: 14px;
    width: auto;
    filter: brightness(0) invert(1);
    opacity: 0.75;
    margin-top: 2px;
  }
</style>
{% endblock %} {% block branding %}
<div id="branding">
  <h1 id="site-name">
    <a id="branding-logo" href="{% url 'taxi_admin:index' %}">

<script>
  (function () {
    document.addEventListener("DOMContentLoaded", function () {
      var sel = document.querySelector('.actions select[name="action"]');
      if (sel) {
        sel.style.removeProperty("width");
        sel.style.minWidth = "240px";
      }
    });
    document.documentElement.setAttribute("data-theme", "light");
    var obs = new MutationObserver(function (muts) {
      muts.forEach(function (m) {
        if (
          m.attributeName === "data-theme" &&
          document.documentElement.getAttribute("data-theme") !== "light"
        ) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      });
    });
    obs.observe(document.documentElement, { attributes: true });
  })();
</script>
